version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hospital_management_db
    environment:
      POSTGRES_DB: hospital_management
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: hospital_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d hospital_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hospital_network

volumes:
  postgres_data:
    driver: local

networks:
  hospital_network:
    driver: bridge

